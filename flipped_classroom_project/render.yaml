# render.yaml — Deploy FlipLearn to Render.com (free tier)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: fliplearn-db
    databaseName: fliplearn
    user: fliplearn
    plan: free
    region: oregon

services:
  - type: web
    name: fliplearn
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu --no-cache-dir &&
      pip install -r requirements.txt --no-cache-dir &&
      python manage.py collectstatic --noinput
    startCommand: python startup.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fliplearn-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
